id="_1-课程介绍"><a href="#_1-课程介绍" class="header-anchor">#</a> 1.课程介绍</h4> <p>Markdown:可以使用普通文本编辑器编写的标记语言，通过简单的标记语法，它可以使普通文本内容具有HTML的格式</p> <p>为什么要学习Markdown：因为Markdown可以为我们生成HTML</p> <h4 id="_2-设置标题"><a href="#_2-设置标题" class="header-anchor">#</a> 2.设置标题</h4> <p><strong>html标题标记的生成(h1--h6)</strong></p> <p><strong># h1 -- ###### h6 标题h1--h6</strong></p> <h4 id="_3-自然段"><a href="#_3-自然段" class="header-anchor">#</a> 3.自然段</h4> <p>自然段换行：<strong>空行</strong>隔开 生成段落，相当于html多个p标签</p> <p>两个<strong>空白</strong> 相当于一个<code>&lt;br/&gt;</code>  在一个p标签内</p> <h4 id="_4-引用表现"><a href="#_4-引用表现" class="header-anchor">#</a> 4.引用表现</h4> <p><code>&gt;+空格</code>  生成<code>&lt;blockquote&gt;</code>标签</p> <h4 id="_5-增加分割线"><a href="#_5-增加分割线" class="header-anchor">#</a> 5.增加分割线</h4> <p>为文章添加分割线：---   ***  ___  - - - 四种方式，生成<code>&lt;hr&gt;</code></p> <h4 id="_6-强调表现"><a href="#_6-强调表现" class="header-anchor">#</a> 6.强调表现</h4> <p>斜体：星号 + 内容 + 星号；下划线 + 内容 +下划线   <code>&lt;em&gt;斜体&lt;/em&gt;</code></p> <p>粗体：星号星号 + 内容 + 星号星号； 下划线下划线 + 内容 + 下划线下划线  <code>&lt;strong&gt;粗体&lt;/strong&gt;</code></p> <div class="language-markdown extra-class"><pre class="language-markdown"><code>斜体：<span class="token italic"><span class="token punctuation">*</span><span class="token content">XXX</span><span class="token punctuation">*</span></span> 或 <span class="token italic"><span class="token punctuation">_</span><span class="token content">XXX</span><span class="token punctuation">_</span></span>
粗体：<span class="token bold"><span class="token punctuation">**</span><span class="token content">XXX</span><span class="token punctuation">**</span></span> 或 <span class="token bold"><span class="token punctuation">__</span><span class="token content">XXX</span><span class="token punctuation">__</span></span>
</code></pre></div><h4 id="_7-列表表示"><a href="#_7-列表表示" class="header-anchor">#</a> 7.列表表示</h4> <p>+ - * 生成无序列表 ul&gt;li</p> <p>数字：生成有序列表 ol&gt;li 格式：数字.空格 内容 注意：数字可以任意，一般1. 0. 0. 0. 0.</p> <p>分为：不加缩进列表</p> <p>缩进：加两个空格 (子列表)</p> <h4 id="_8-超文本链接"><a href="#_8-超文本链接" class="header-anchor">#</a> 8.超文本链接</h4> <div class="language-markdown extra-class"><pre class="language-markdown"><code>http://baidu.com
